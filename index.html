<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acquifin Holdings — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue:    #1a4fd6;
      --blue-lt: #2e6af0;
      --green:   #00c87a;
      --teal:    #00a89a;
      --black:   #000000;
      --dark:    #060c18;
      --mid:     #0b1528;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    /* ── Animated grid background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(26,79,214,.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,79,214,.07) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes gridMove {
      0%   { background-position: 0 0; }
      100% { background-position: 60px 60px; }
    }

    /* ── Radial glow blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: .18;
      pointer-events: none;
      z-index: 0;
      animation: blobPulse 8s ease-in-out infinite alternate;
    }
    .blob-1 { width: 600px; height: 600px; background: var(--blue);  top: -150px; left: -150px; }
    .blob-2 { width: 500px; height: 500px; background: var(--green); bottom: -100px; right: -100px; animation-delay: -4s; }
    .blob-3 { width: 350px; height: 350px; background: var(--teal);  top: 40%; left: 50%; transform: translate(-50%,-50%); animation-delay: -2s; }
    @keyframes blobPulse {
      from { opacity: .13; transform: scale(1); }
      to   { opacity: .22; transform: scale(1.1); }
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
      text-align: center;
    }

    /* ── Logo ── */
    .logo-wrap {
      margin-bottom: 28px;
      animation: fadeDown .9s ease both;
    }
    .logo-wrap img {
      width: 220px;
      max-width: 55vw;
      filter: drop-shadow(0 0 30px rgba(0,200,122,.35));
    }

    /* ── Coming Soon tag ── */
    .tag {
      display: inline-block;
      font-family: 'Rajdhani', sans-serif;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--green);
      border: 1px solid rgba(0,200,122,.4);
      padding: 6px 18px;
      border-radius: 50px;
      margin-bottom: 22px;
      animation: fadeDown .9s .15s ease both;
      backdrop-filter: blur(6px);
      background: rgba(0,200,122,.06);
    }

    /* ── Headline ── */
    h1 {
      font-size: clamp(2.8rem, 8vw, 6.5rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, #fff 30%, var(--blue-lt) 65%, var(--green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeDown .9s .25s ease both;
      margin-bottom: 16px;
    }
    h1 span { display: block; }

    /* ── Sub ── */
    .sub {
      font-size: clamp(.9rem, 2.2vw, 1.15rem);
      font-weight: 300;
      color: rgba(255,255,255,.55);
      max-width: 520px;
      line-height: 1.7;
      animation: fadeDown .9s .35s ease both;
      margin-bottom: 48px;
    }

    /* ── Countdown ── */
    .countdown {
      display: flex;
      gap: clamp(12px, 3vw, 28px);
      margin-bottom: 56px;
      animation: fadeUp .9s .45s ease both;
    }
    .cd-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 12px;
      padding: clamp(14px,3vw,22px) clamp(16px,3.5vw,30px);
      min-width: clamp(68px,14vw,100px);
      backdrop-filter: blur(10px);
      transition: border-color .3s;
    }
    .cd-box:hover { border-color: rgba(0,200,122,.4); }
    .cd-num {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(2rem,6vw,3.5rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(160deg, var(--blue-lt), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .cd-label {
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(255,255,255,.35);
      margin-top: 6px;
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      max-width: 480px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,200,122,.4), rgba(26,79,214,.4), transparent);
      margin-bottom: 40px;
      animation: fadeUp .9s .55s ease both;
    }

    /* ── Contact section ── */
    .contact-block {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin-bottom: 48px;
      animation: fadeUp .9s .65s ease both;
    }
    .contact-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 50px;
      padding: 11px 22px;
      font-size: .9rem;
      font-weight: 400;
      color: rgba(255,255,255,.8);
      text-decoration: none;
      transition: all .3s ease;
      backdrop-filter: blur(8px);
    }
    .contact-pill:hover {
      background: rgba(0,200,122,.12);
      border-color: var(--green);
      color: #fff;
      transform: translateY(-2px);
    }
    .contact-pill svg { flex-shrink: 0; }

    /* ── Social icons ── */
    .social-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      animation: fadeUp .9s .75s ease both;
    }
    .soc-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.5);
      text-decoration: none;
      transition: all .3s ease;
      backdrop-filter: blur(6px);
    }
    .soc-btn:hover {
      border-color: var(--green);
      color: var(--green);
      background: rgba(0,200,122,.1);
      transform: translateY(-3px) scale(1.08);
    }
    /* Hidden social icons — visible but subdued; uncomment display:none to fully hide */
    .soc-hidden { display: flex; /* change to display:none to hide */ }

    /* ── Footer note ── */
    .footer-note {
      position: absolute;
      bottom: 22px;
      font-size: .7rem;
      letter-spacing: .1em;
      color: rgba(255,255,255,.18);
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Particle dots ── */
    canvas#particles {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: .45;
    }

    @media (max-width: 480px) {
      .countdown { gap: 10px; }
      .cd-box { min-width: 62px; padding: 12px 14px; }
    }
  </style>
</head>

<script>
  // ── Countdown to a target date (set your own launch date here) ──
  const LAUNCH_DATE = new Date('2025-12-31T00:00:00');

  function updateCountdown() {
    const now  = new Date();
    const diff = LAUNCH_DATE - now;
    if (diff <= 0) {
      document.querySelector('.countdown').innerHTML = '<p style="color:var(--green);font-size:1.4rem;font-weight:700;letter-spacing:.1em;">WE ARE LIVE!</p>';
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000)  / 60000);
    const s = Math.floor((diff % 60000)    / 1000);
    document.getElementById('cd-days').textContent  = String(d).padStart(2,'0');
    document.getElementById('cd-hours').textContent = String(h).padStart(2,'0');
    document.getElementById('cd-mins').textContent  = String(m).padStart(2,'0');
    document.getElementById('cd-secs').textContent  = String(s).padStart(2,'0');
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);

  // ── Floating particle canvas ──
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const COLORS = ['rgba(26,79,214,', 'rgba(0,200,122,', 'rgba(0,168,154,'];

  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.8 + .4,
      dx: (Math.random() - .5) * .35,
      dy: (Math.random() - .5) * .35,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: Math.random() * .6 + .2,
    });
  }

  function drawParticles() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color + p.alpha + ')';
      ctx.fill();
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    }
    requestAnimationFrame(drawParticles);
  }
  drawParticles();
</script>
